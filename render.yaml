services:
  - type: web
    name: sosomind-backend
    runtime: node
    plan: starter
    region: oregon
    rootDir: packages/backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SOSO_API_KEY
        sync: false
      - key: SOSO_API_KEY_FALLBACK
        sync: false
      - key: SOSO_API_KEY_FALLBACK_2
        sync: false
      - key: SOSO_BASE_URL
        value: https://openapi.sosovalue.com/openapi/v1
      - key: SODEX_PRIVATE_KEY
        sync: false
      - key: SODEX_ADDRESS
        sync: false
      - key: SODEX_CHAIN_ID
        value: "138565"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  - type: cron
    name: sosomind-heartbeat
    runtime: node
    rootDir: packages/backend
    schedule: "*/5 * * * *"
    buildCommand: npm install --include=dev && npm run build
    startCommand: node -e "require('./dist/cron/heartbeat.js').runHeartbeat().then(r => console.log(r))"
    envVars:
      - fromGroup: sosomind-backend
